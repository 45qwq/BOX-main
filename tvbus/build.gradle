plugins {
    id 'com.android.library'
}

android {
    namespace 'com.tvbus.engine'

    compileSdk 36

    defaultConfig {
        minSdk 24
        targetSdk 28
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation project(':catvod')
}